<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e8700a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ultra Cine">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>Ultra Cine · Realme Note 60X</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        /* ========== RESET E VARIÁVEIS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --accent: #e8700a;
            --accent-light: #f5c842;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --surface: #111827;
            --surface-2: #1e293b;
            --surface-3: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: pan-x pan-y;
        }

        /* ========== ANIMAÇÕES ========== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== TELA DE LOGIN ========== */
        #loginScreen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 30% 40%, #0f172a 0%, #020617 100%);
            z-index: 9999;
        }
        .login-box {
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            width: min(340px, 85vw);
            text-align: center;
            animation: fadeUp 0.5s ease;
        }
        .login-logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.6rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            background: var(--surface-2);
            border: 1px solid #334155;
            border-radius: 60px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,112,10,0.25);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 60px;
            font-weight: 700;
            color: #0f172a;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.98); }
        .login-error {
            min-height: 40px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #ff6b6b;
        }
        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            text-decoration: none;
            color: var(--text);
            margin: 12px 0 6px;
        }
        .whatsapp-link i { color: #25D366; }
        .login-footer {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 16px;
        }

        /* ========== APP PRINCIPAL ========== */
        #app { min-height: 100vh; }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .menu-btn {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background: var(--surface-2);
            border-radius: 50%;
            cursor: pointer;
            touch-action: manipulation;
        }
        .menu-btn:active { background: var(--accent); color: #000; }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--surface);
            border: 1px solid #2d3a4e;
            border-radius: 44px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .topbar-logo { font-size: 1.4rem; color: var(--accent); }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background: rgba(8,8,8,0.97);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            overflow-y: auto;
            z-index: 500;
            transition: left 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        #sidebar.open { left: 0; }
        .sidebar-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-light);
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            margin: 20px 0 10px;
        }
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 14px;
            background: var(--surface);
            border: none;
            border-radius: 40px;
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 8px;
            touch-action: manipulation;
        }
        .sidebar-btn:active {
            background: var(--accent);
            color: #000;
            transform: translateX(4px);
        }
        .sidebar-btn.danger:active { background: #b91c1c; }
        .sidebar-btn.install { background: var(--accent); color: #000; font-weight: 700; }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 499;
        }
        .sidebar-overlay.show { display: block; }

        /* Categorias (chips) */
        .categories-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .categories-bar::-webkit-scrollbar { display: none; }
        .cat-chip {
            flex-shrink: 0;
            padding: 6px 16px;
            background: var(--surface-2);
            border: 1px solid transparent;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .cat-chip:active { border-color: var(--accent); color: var(--accent-light); }
        .cat-chip.active {
            background: linear-gradient(120deg, var(--accent), var(--accent-light));
            color: #0f172a;
            font-weight: 700;
        }

        /* Grid de filmes/séries */
        .content { padding: 20px 16px 60px; }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 480px) {
            .movies-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 768px) {
            .movies-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 1024px) {
            .movies-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .skeleton-card {
            background: var(--surface-2);
            border-radius: 16px;
            aspect-ratio: 2/3;
            animation: pulse 1.5s infinite;
        }
        .movie-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            touch-action: manipulation;
        }
        .movie-card:active { transform: scale(0.98); }
        .card-thumb {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: var(--surface-2);
        }
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }
        .card-badge.serie { color: #38bdf8; border: 1px solid #38bdf8; }
        .card-badge.filme { color: #a78bfa; border: 1px solid #a78bfa; }
        .card-fav {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 1rem;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eab308;
            touch-action: manipulation;
        }
        .card-fav.active { color: var(--accent); }
        .card-body { padding: 10px 12px 12px; }
        .card-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: var(--accent-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            font-size: 0.6rem;
            margin: 4px 0 6px;
        }
        .card-meta span {
            background: var(--surface-2);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .card-desc {
            font-size: 0.65rem;
            color: #8c9ab5;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .card-watch {
            padding: 8px 0;
            background: var(--accent);
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #0f172a;
            text-align: center;
            touch-action: manipulation;
        }
        .card-watch:active { background: var(--accent-light); transform: scale(0.98); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== MODAL DO PLAYER (tamanho Realme Note 60X) ========== */
        #videoModal {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #videoModal.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal-container {
            width: 100%;
            max-width: 100%;
            height: 100%;
            background: #0b0f1a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        /* Player wrapper ocupa 45% da altura em retrato (para não esmagar info) */
        .player-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            height: 45vh;
            min-height: 200px;
            flex-shrink: 0;
        }
        #modalVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        /* Spinner */
        .player-spinner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .player-spinner .spin-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .player-spinner.hide { display: none; }

        /* Overlay de controles touch */
        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.8) 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .player-wrapper:hover .player-overlay,
        .player-wrapper.show-controls .player-overlay {
            opacity: 1;
        }
        .overlay-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .overlay-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1rem;
            color: #fff;
            text-shadow: 0 1px 4px black;
            max-width: 70%;
        }
        .overlay-close {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            touch-action: manipulation;
        }
        .overlay-close:active { background: var(--accent); }
        .overlay-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }
        .ctrl-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.12);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: var(--accent); transform: scale(0.95); }
        .ctrl-btn.play-pause {
            width: 56px;
            height: 56px;
            background: var(--accent);
            font-size: 1.4rem;
        }
        .overlay-bottom {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .progress-container {
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
            cursor: pointer;
            touch-action: none;
        }
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
        }
        .progress-thumb {
            position: absolute;
            top: 50%;
            transform: translateX(-50%) translateY(-50%) scale(0);
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid white;
            transition: transform 0.1s;
        }
        .progress-container:active .progress-thumb {
            transform: translateX(-50%) translateY(-50%) scale(1);
        }
        .overlay-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ctrl-mini {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            padding: 6px;
            min-width: 40px;
            min-height: 40px;
            touch-action: manipulation;
        }
        .ctrl-mini:active { color: var(--accent-light); }
        .volume-group { display: flex; align-items: center; gap: 6px; }
        .volume-slider {
            width: 70px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.25);
            border-radius: 3px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .time-display { font-size: 0.7rem; color: rgba(255,255,255,0.8); }
        .speed-select {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 8px;
        }
        /* Informações do modal */
        .modal-info {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .modal-meta-row span {
            background: var(--surface-2);
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .series-panel {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .season-select {
            width: 100%;
            padding: 8px;
            background: var(--surface-3);
            border: 1px solid var(--accent);
            border-radius: 20px;
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 6px;
        }
        .ep-btn {
            padding: 8px 4px;
            background: var(--surface-2);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.7rem;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        .ep-btn:active { background: var(--accent); color: #000; }
        .ep-btn.active { background: var(--accent); color: #000; }
        .modal-description {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #b0bec5;
            margin-bottom: 12px;
        }
        .more-link {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }
        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .modal-tags span {
            background: var(--surface-2);
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .modal-cast {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 6px;
        }
        /* Snackbars */
        .snackbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 5000;
            white-space: nowrap;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .snackbar.show { display: flex; }
        .snack-btn {
            background: var(--accent);
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
            color: #0f172a;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">ULTRA CINE</div>
            <div class="login-subtitle">✦ REALME NOTE 60X ✦</div>
            <input type="password" id="keyInput" class="login-input" placeholder="🔑 Chave de acesso" autocomplete="off">
            <button class="login-btn" id="loginBtn">ENTRAR</button>
            <div id="loginError" class="login-error"></div>
            <a class="whatsapp-link" id="whatsappBtn" href="#" target="_blank"><i class="fab fa-whatsapp"></i> Solicitar Key</a>
            <div class="login-footer">📱 Offline · Player touch · Instalável</div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" class="hidden">
        <header class="topbar">
            <div class="menu-btn" id="menuToggleBtn">☰</div>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por título, elenco...">
            <i class="fas fa-film topbar-logo"></i>
        </header>
        <nav class="categories-bar" id="topCategories"></nav>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside id="sidebar">
            <div class="sidebar-section-title"><i class="fas fa-compass"></i> Navegação</div>
            <button class="sidebar-btn" id="showAllBtn"><i class="fas fa-home"></i> Início</button>
            <button class="sidebar-btn" id="historyBtn"><i class="fas fa-history"></i> Histórico</button>
            <button class="sidebar-btn" id="favoritesBtn"><i class="fas fa-heart"></i> Favoritos</button>
            <hr style="border-color:#1e293b; margin:16px 0;">
            <div class="sidebar-section-title"><i class="fas fa-tags"></i> Gêneros</div>
            <div id="sidebarGenres"></div>
            <hr style="border-color:#1e293b; margin:16px 0;">
            <button class="sidebar-btn install" id="installAppBtn" style="display:none;"><i class="fas fa-download"></i> Instalar App</button>
            <button class="sidebar-btn danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </aside>
        <main class="content">
            <div id="moviesContainer"></div>
        </main>
    </div>

    <!-- MODAL PLAYER (OTIMIZADO PARA REALME NOTE 60X) -->
    <div id="videoModal" role="dialog" aria-modal="true">
        <div class="modal-container">
            <div class="player-wrapper" id="playerWrapper">
                <video id="modalVideo" preload="metadata" playsinline></video>
                <div class="player-spinner" id="playerSpinner"><div class="spin-ring"></div></div>
                <div class="player-overlay" id="playerOverlay">
                    <div class="overlay-top">
                        <div class="overlay-title" id="overlayTitle"></div>
                        <button class="overlay-close" id="overlayCloseBtn"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="overlay-center">
                        <button class="ctrl-btn" id="seekBackBtn"><i class="fas fa-backward"></i></button>
                        <button class="ctrl-btn play-pause" id="playPauseBtn"><i class="fas fa-play" id="playPauseIcon"></i></button>
                        <button class="ctrl-btn" id="seekFwdBtn"><i class="fas fa-forward"></i></button>
                    </div>
                    <div class="overlay-bottom">
                        <div class="progress-container" id="progressContainer">
                            <div class="progress-track"><div class="progress-fill" id="progressFill"></div><div class="progress-thumb" id="progressThumb"></div></div>
                        </div>
                        <div class="overlay-controls-row">
                            <div class="volume-group">
                                <button class="ctrl-mini" id="muteBtn"><i class="fas fa-volume-up" id="muteIcon"></i></button>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                            </div>
                            <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                            <div style="display:flex; gap:6px;">
                                <select class="speed-select" id="speedSelect">
                                    <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
                                    <option value="1" selected>1x</option><option value="1.25">1.25x</option>
                                    <option value="1.5">1.5x</option><option value="2">2x</option>
                                </select>
                                <button class="ctrl-mini" id="pipBtn"><i class="fas fa-compress-alt"></i></button>
                                <button class="ctrl-mini" id="fullscreenBtn"><i class="fas fa-expand" id="fsIcon"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-info">
                <div class="modal-meta-row" id="modalMeta"></div>
                <div class="series-panel" id="seriesPanel" style="display:none;">
                    <div class="series-panel-title"><i class="fas fa-list"></i> Episódios</div>
                    <select id="seasonSelect" class="season-select"></select>
                    <div class="episodes-grid" id="episodesList"></div>
                </div>
                <div class="modal-description" id="modalDesc"></div>
                <div class="modal-tags" id="modalCats"></div>
                <div class="modal-cast" id="modalCast"></div>
            </div>
        </div>
    </div>

    <!-- SNACKBARS -->
    <div id="updateSnackbar" class="snackbar">✨ Nova versão! <button class="snack-btn" id="refreshBtn">Atualizar</button></div>
    <div id="offlineSnackbar" class="snackbar">⚠️ Modo offline — vídeos em cache</div>

    <script src="filmes.js"></script>
    <script>
        (function(){
            // ========== CONFIGURAÇÃO ==========
            const CFG = {
                key: '1234',
                whatsappNum: '258858222129',
                whatsappMsg: 'Olá, quero acesso ao Ultra Cine',
                sessionDays: 7,
                maxAttempts: 5,
                blockMs: 30000
            };

            // ========== ELEMENTOS ==========
            const el = id => document.getElementById(id);
            const loginScreen = el('loginScreen'), app = el('app');
            const keyInput = el('keyInput'), loginBtn = el('loginBtn'), loginError = el('loginError');
            const menuToggle = el('menuToggleBtn'), sidebar = el('sidebar'), sidebarOverlay = el('sidebarOverlay');
            const searchInput = el('searchInput'), topCats = el('topCategories'), sidebarGenres = el('sidebarGenres');
            const moviesContainer = el('moviesContainer');
            const showAll = el('showAllBtn'), historyBtn = el('historyBtn'), favBtn = el('favoritesBtn'), logout = el('logoutBtn'), installBtn = el('installAppBtn');
            const modal = el('videoModal'), modalVideo = el('modalVideo'), spinner = el('playerSpinner');
            const closeModalBtn = el('overlayCloseBtn'), playPause = el('playPauseBtn'), playIcon = el('playPauseIcon');
            const seekBack = el('seekBackBtn'), seekFwd = el('seekFwdBtn');
            const progressContainer = el('progressContainer'), progressFill = el('progressFill'), progressThumb = el('progressThumb');
            const mute = el('muteBtn'), muteIcon = el('muteIcon'), volumeSlider = el('volumeSlider'), timeDisplay = el('timeDisplay');
            const speedSelect = el('speedSelect'), pip = el('pipBtn'), fullscreen = el('fullscreenBtn'), fsIcon = el('fsIcon');
            const seriesPanel = el('seriesPanel'), seasonSelect = el('seasonSelect'), episodesList = el('episodesList');
            const modalMeta = el('modalMeta'), modalDesc = el('modalDesc'), modalCats = el('modalCats'), modalCast = el('modalCast');
            const playerWrapper = el('playerWrapper'), overlayTitle = el('overlayTitle');
            const updateSnack = el('updateSnackbar'), offlineSnack = el('offlineSnackbar');

            // ========== ESTADO ==========
            let filmes = [], currentFilter = 'todos', activeCats = new Set(), searchText = '';
            let loginAttempts = 0, loginBlocked = 0;
            let historico = safeParse('ultraCineHistorico', []), favoritos = safeParse('ultraCineFavoritos', []).map(String);
            function safeParse(k, f) { try { return JSON.parse(localStorage.getItem(k)) || f; } catch { return f; } }
            function saveHist() { localStorage.setItem('ultraCineHistorico', JSON.stringify(historico)); }
            function saveFav() { localStorage.setItem('ultraCineFavoritos', JSON.stringify(favoritos)); }
            function addHistory(id) { historico = historico.filter(h => h.id !== id); historico.unshift({ id: String(id), ts: Date.now() }); if (historico.length>100) historico.pop(); saveHist(); }
            function toggleFav(id, e) { if(e) e.stopPropagation(); const sid = String(id); if(favoritos.includes(sid)) favoritos = favoritos.filter(i=>i!==sid); else favoritos.push(sid); saveFav(); refreshView(); }

            // ========== PWA ==========
            if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.warn));
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'flex'; });
            installBtn.addEventListener('click', () => { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>installBtn.style.display='none'); } });
            window.addEventListener('online', ()=>offlineSnack.classList.remove('show'));
            window.addEventListener('offline', ()=>offlineSnack.classList.add('show'));
            if(!navigator.onLine) offlineSnack.classList.add('show');

            // ========== LOGIN ==========
            function checkSession() { const logged = localStorage.getItem('ultraLogged')==='true', exp = parseInt(localStorage.getItem('ultraExpires')||'0'); return logged && exp > Date.now(); }
            function doLogin() {
                const now = Date.now();
                if(loginBlocked > now) { loginError.innerText = `⏳ Bloqueado ${Math.ceil((loginBlocked-now)/1000)}s`; return; }
                if(keyInput.value === CFG.key) {
                    loginAttempts = 0;
                    localStorage.setItem('ultraLogged','true');
                    localStorage.setItem('ultraExpires', String(Date.now() + CFG.sessionDays*864e5));
                    loginScreen.style.display = 'none';
                    app.classList.remove('hidden');
                    initApp();
                } else {
                    loginAttempts++;
                    if(loginAttempts >= CFG.maxAttempts) { loginBlocked = Date.now() + CFG.blockMs; loginError.innerText = '❌ Bloqueado 30s'; }
                    else loginError.innerText = `❌ Chave inválida (${loginAttempts}/${CFG.maxAttempts})`;
                }
            }
            loginBtn.addEventListener('click', doLogin);
            keyInput.addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
            logout.addEventListener('click', () => { localStorage.clear(); location.reload(); });
            document.getElementById('refreshBtn')?.addEventListener('click',()=>location.reload());

            // ========== PROCESSAMENTO DE DADOS ==========
            function normCats(r) { if(!r) return ['Geral']; if(typeof r==='string') return r.split(',').map(s=>s.trim()).filter(Boolean); if(Array.isArray(r)) return r; return ['Geral']; }
            function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
            function formatDur(d) { return d?.replace(/min/i,'min')||''; }
            function processData(raw) {
                const groups = {};
                raw.forEach(item => {
                    if(item.tipo === 'serie') {
                        let base = item.title.split(/\s*[-–]\s*Episódio/i)[0].trim();
                        if(!groups[base]) {
                            groups[base] = {
                                id: item.id, title: base, tipo: 'serie', image: item.image,
                                description: item.description, release_year: item.release_year,
                                duration: item.duration, categories: item.categories,
                                cast: item.cast || [], lang: item.lang, seasons: { '1': [] }
                            };
                        }
                        let epMatch = item.title.match(/Episódio\s*(\d+)/i);
                        let epNum = epMatch ? parseInt(epMatch[1],10) : groups[base].seasons['1'].length+1;
                        groups[base].seasons['1'].push({ number: epNum, title: item.title, video_url: item.video_url });
                    } else {
                        groups[item.id] = { ...item, tipo: 'filme' };
                    }
                });
                Object.values(groups).forEach(s => { if(s.seasons?.['1']) s.seasons['1'].sort((a,b)=>a.number-b.number); });
                return Object.values(groups);
            }

            // ========== RENDER ==========
            function renderSkeletons(n=12) {
                let html = '<div class="movies-grid">';
                for(let i=0;i<n;i++) html += '<div class="skeleton-card"></div>';
                moviesContainer.innerHTML = html+'</div>';
            }
            function renderGrid(list) {
                if(!list.length) { moviesContainer.innerHTML = '<div class="empty-state"><i class="fas fa-film"></i><p>Nenhum título encontrado</p></div>'; return; }
                let html = '<div class="movies-grid">';
                list.forEach((m,idx) => {
                    const isFav = favoritos.includes(String(m.id));
                    const badge = m.tipo === 'serie' ? 'serie' : 'filme';
                    const badgeTxt = m.tipo === 'serie' ? '📺 Série' : '🎬 Filme';
                    const img = m.image || 'https://placehold.co/400x600?text=Poster';
                    const desc = (m.description || 'Sinopse não disponível.').slice(0,80);
                    html += `<div class="movie-card" data-id="${m.id}">
                        <div class="card-thumb">
                            <img src="${img}" alt="${escapeHtml(m.title)}" loading="lazy" onerror="this.src='https://placehold.co/400x600?text=Sem+Imagem'">
                            <div class="card-badge ${badge}">${badgeTxt}</div>
                            <div class="card-fav ${isFav ? 'active' : ''}" data-id="${m.id}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></div>
                        </div>
                        <div class="card-body">
                            <div class="card-title">${escapeHtml(m.title)}</div>
                            <div class="card-meta">${m.release_year ? `<span>${escapeHtml(m.release_year)}</span>` : ''}${m.lang ? `<span>${escapeHtml(m.lang)}</span>` : ''}${m.duration ? `<span>${escapeHtml(formatDur(m.duration))}</span>` : ''}</div>
                            <div class="card-desc">${escapeHtml(desc)}</div>
                            <div class="card-watch" data-id="${m.id}">▶ Assistir</div>
                        </div>
                    </div>`;
                });
                moviesContainer.innerHTML = html+'</div>';
                document.querySelectorAll('.card-watch').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); }));
                document.querySelectorAll('.card-fav').forEach(btn => btn.addEventListener('click', e => toggleFav(btn.dataset.id, e)));
                document.querySelectorAll('.movie-card').forEach(card => card.addEventListener('click', e => { if(!e.target.closest('.card-watch') && !e.target.closest('.card-fav')) openModal(card.dataset.id); }));
            }

            function getFiltered() {
                let list = [...filmes];
                if(currentFilter === '__favoritos__') list = list.filter(m => favoritos.includes(String(m.id)));
                else if(currentFilter === '__historico__') list = historico.map(h=>filmes.find(f=>f.id===h.id)).filter(Boolean);
                else if(activeCats.size) list = list.filter(m => normCats(m.categories).some(c => activeCats.has(c)));
                if(searchText.trim()) { const q = searchText.toLowerCase(); list = list.filter(m => m.title.toLowerCase().includes(q) || (m.description||'').toLowerCase().includes(q) || (m.cast||[]).some(a=>a.toLowerCase().includes(q))); }
                return list;
            }
            function refreshView() { renderGrid(getFiltered()); syncChips(); }
            function filterByCat(cat, multi) {
                if(cat === 'todos') { activeCats.clear(); currentFilter = 'todos'; }
                else { if(multi) { if(activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat); } else { activeCats.clear(); activeCats.add(cat); } currentFilter = 'categoria'; }
                searchText = ''; searchInput.value = ''; refreshView(); closeSidebar();
            }
            function syncChips() { topCats.querySelectorAll('.cat-chip').forEach(btn => { const c = btn.dataset.cat; if(c==='todos') btn.classList.toggle('active', currentFilter==='todos' && activeCats.size===0); else btn.classList.toggle('active', activeCats.has(c)); }); }
            function buildCategories() {
                const set = new Set(); filmes.forEach(m => normCats(m.categories).forEach(c=>set.add(c))); const cats = [...set].sort();
                topCats.innerHTML = `<button class="cat-chip active" data-cat="todos">🎞️ Todos</button>` + cats.map(c=>`<button class="cat-chip" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
                topCats.querySelectorAll('.cat-chip').forEach(btn => btn.addEventListener('click',()=>filterByCat(btn.dataset.cat, true)));
                sidebarGenres.innerHTML = cats.map(c=>`<button class="sidebar-btn" data-cat="${escapeHtml(c)}"><i class="fas fa-tag"></i> ${escapeHtml(c)}</button>`).join('');
                sidebarGenres.querySelectorAll('.sidebar-btn').forEach(btn => btn.addEventListener('click',()=>filterByCat(btn.dataset.cat, false)));
            }

            // ========== SIDEBAR ==========
            function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
            function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }
            menuToggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); });
            sidebarOverlay.addEventListener('click', closeSidebar);
            showAll.addEventListener('click', () => { currentFilter='todos'; activeCats.clear(); refreshView(); closeSidebar(); });
            historyBtn.addEventListener('click', () => { currentFilter='__historico__'; activeCats.clear(); refreshView(); closeSidebar(); });
            favBtn.addEventListener('click', () => { currentFilter='__favoritos__'; activeCats.clear(); refreshView(); closeSidebar(); });
            searchInput.addEventListener('input', e => { searchText = e.target.value; refreshView(); });

            // ========== PLAYER (ANDROID TOUCH) ==========
            let controlsTimer;
            function showControls() { playerWrapper.classList.add('show-controls'); clearTimeout(controlsTimer); if(!modalVideo.paused) controlsTimer = setTimeout(()=>playerWrapper.classList.remove('show-controls'), 3000); }
            playerWrapper.addEventListener('mousemove', showControls);
            playerWrapper.addEventListener('touchstart', ()=>playerWrapper.classList.toggle('show-controls'), {passive:true});
            function syncPlayIcon() { playIcon.className = modalVideo.paused ? 'fas fa-play' : 'fas fa-pause'; }
            playPause.addEventListener('click', ()=>{ if(modalVideo.paused) modalVideo.play().catch(()=>{}); else modalVideo.pause(); });
            modalVideo.addEventListener('play', ()=>{ syncPlayIcon(); showControls(); });
            modalVideo.addEventListener('pause', ()=>{ syncPlayIcon(); playerWrapper.classList.add('show-controls'); });
            seekBack.addEventListener('click', ()=>modalVideo.currentTime = Math.max(0, modalVideo.currentTime-10));
            seekFwd.addEventListener('click', ()=>modalVideo.currentTime = Math.min(modalVideo.duration||0, modalVideo.currentTime+10));
            modalVideo.addEventListener('click', ()=>{ if(modalVideo.paused) modalVideo.play().catch(()=>{}); else modalVideo.pause(); showControls(); });
            modalVideo.addEventListener('dblclick', ()=>toggleFullscreen());
            function formatTime(s) { if(isNaN(s)) return '0:00'; const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); return h>0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`; }
            modalVideo.addEventListener('timeupdate', () => {
                if(!modalVideo.duration) return;
                let pct = (modalVideo.currentTime / modalVideo.duration)*100;
                progressFill.style.width = pct+'%'; progressThumb.style.left = pct+'%';
                timeDisplay.textContent = `${formatTime(modalVideo.currentTime)} / ${formatTime(modalVideo.duration)}`;
            });
            function seekFrom(e) { const rect = progressContainer.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; let ratio = (clientX - rect.left)/rect.width; ratio = Math.min(1, Math.max(0, ratio)); if(modalVideo.duration) modalVideo.currentTime = ratio * modalVideo.duration; }
            progressContainer.addEventListener('click', seekFrom);
            let dragging = false;
            progressContainer.addEventListener('mousedown', e=>{ dragging=true; seekFrom(e); });
            document.addEventListener('mousemove', e=>{ if(dragging) seekFrom(e); });
            document.addEventListener('mouseup', ()=>dragging=false);
            progressContainer.addEventListener('touchstart', e=>{ dragging=true; seekFrom(e); }, {passive:true});
            document.addEventListener('touchmove', e=>{ if(dragging) seekFrom(e); }, {passive:true});
            document.addEventListener('touchend', ()=>dragging=false);
            modalVideo.addEventListener('waiting', ()=>spinner.classList.remove('hide'));
            modalVideo.addEventListener('playing', ()=>spinner.classList.add('hide'));
            modalVideo.addEventListener('canplay', ()=>spinner.classList.add('hide'));
            volumeSlider.addEventListener('input', ()=>{ modalVideo.volume = parseFloat(volumeSlider.value); modalVideo.muted = modalVideo.volume===0; syncMuteIcon(); });
            mute.addEventListener('click', ()=>{ modalVideo.muted = !modalVideo.muted; if(!modalVideo.muted && modalVideo.volume===0){ modalVideo.volume=0.5; volumeSlider.value='0.5'; } syncMuteIcon(); });
            function syncMuteIcon() { if(modalVideo.muted || modalVideo.volume===0) muteIcon.className = 'fas fa-volume-mute'; else if(modalVideo.volume<0.5) muteIcon.className = 'fas fa-volume-down'; else muteIcon.className = 'fas fa-volume-up'; }
            speedSelect.addEventListener('change', ()=>modalVideo.playbackRate = parseFloat(speedSelect.value));
            pip.addEventListener('click', ()=>{ if(document.pictureInPictureElement) document.exitPictureInPicture(); else if(modalVideo.requestPictureInPicture) modalVideo.requestPictureInPicture(); });
            function toggleFullscreen() { const el = playerWrapper; if(!document.fullscreenElement) (el.requestFullscreen||el.webkitRequestFullscreen).call(el); else (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
            fullscreen.addEventListener('click', toggleFullscreen);
            document.addEventListener('fullscreenchange', ()=> fsIcon.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand');
            document.addEventListener('keydown', e => { if(!modal.classList.contains('open')) return; const tag = document.activeElement.tagName; if(tag==='INPUT'||tag==='SELECT') return; switch(e.key){ case ' ': case 'k': e.preventDefault(); if(modalVideo.paused) modalVideo.play().catch(()=>{}); else modalVideo.pause(); break; case 'ArrowLeft': e.preventDefault(); seekBack.click(); break; case 'ArrowRight': e.preventDefault(); seekFwd.click(); break; case 'ArrowUp': e.preventDefault(); modalVideo.volume = Math.min(1, modalVideo.volume+0.1); volumeSlider.value = modalVideo.volume; syncMuteIcon(); break; case 'ArrowDown': e.preventDefault(); modalVideo.volume = Math.max(0, modalVideo.volume-0.1); volumeSlider.value = modalVideo.volume; syncMuteIcon(); break; case 'm': modalVideo.muted = !modalVideo.muted; syncMuteIcon(); break; case 'f': toggleFullscreen(); break; case 'Escape': closeModal(); break; } });
            function buildDesc(text) { if(!text) text = 'Sinopse não disponível.'; const limit = 160; if(text.length <= limit) { modalDesc.textContent = text; return; } const short = text.slice(0,limit); modalDesc.innerHTML = `<span class="desc-short">${escapeHtml(short)}… </span><span class="desc-full" style="display:none">${escapeHtml(text)}</span><span class="more-link">mais</span>`; const more = modalDesc.querySelector('.more-link'); more.addEventListener('click', ()=>{ const expanded = modalDesc.dataset.expanded === '1'; modalDesc.dataset.expanded = expanded ? '0' : '1'; modalDesc.querySelector('.desc-short').style.display = expanded ? '' : 'none'; modalDesc.querySelector('.desc-full').style.display = expanded ? 'none' : ''; more.textContent = expanded ? 'mais' : 'menos'; }); }
            function loadEpisode(ep, btn) { if(modalVideo.src !== ep.video_url) { modalVideo.src = ep.video_url; modalVideo.load(); } modalVideo.play().catch(()=>{}); overlayTitle.textContent = ep.title; document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active')); if(btn) btn.classList.add('active'); }
            function openModal(id) {
                const item = filmes.find(f=> f.id === id || String(f.id)===String(id)); if(!item) return;
                addHistory(id); modalVideo.pause(); modalVideo.src = ''; spinner.classList.remove('hide'); speedSelect.value='1'; modalVideo.playbackRate=1; overlayTitle.textContent = item.title;
                const metas = [item.release_year && `📅 ${escapeHtml(item.release_year)}`, item.duration && `⏱ ${escapeHtml(formatDur(item.duration))}`, item.lang && `🌐 ${escapeHtml(item.lang)}`, item.tipo==='serie' ? '📺 Série' : '🎬 Filme'].filter(Boolean);
                modalMeta.innerHTML = metas.map(m=>`<span>${m}</span>`).join('');
                if(item.tipo === 'serie' && item.seasons) {
                    seriesPanel.style.display = 'block';
                    seasonSelect.innerHTML = Object.keys(item.seasons).map(s=>`<option value="${s}">Temporada ${s}</option>`).join('');
                    const renderEps = (season) => {
                        const eps = item.seasons[season]||[];
                        episodesList.innerHTML = eps.map(ep=>`<div class="ep-btn" data-url="${ep.video_url}" data-title="${escapeHtml(ep.title)}">EP ${ep.number}</div>`).join('');
                        episodesList.querySelectorAll('.ep-btn').forEach(btn=> btn.addEventListener('click',()=>loadEpisode({video_url:btn.dataset.url, title:btn.dataset.title}, btn)));
                        if(eps.length) { const first = episodesList.querySelector('.ep-btn'); loadEpisode(eps[0], first); }
                    };
                    seasonSelect.addEventListener('change',()=>renderEps(seasonSelect.value));
                    renderEps('1');
                } else { seriesPanel.style.display = 'none'; modalVideo.src = item.video_url||''; modalVideo.load(); modalVideo.play().catch(()=>{}); }
                buildDesc(item.description);
                const cats = normCats(item.categories); modalCats.innerHTML = cats.map(c=>`<span>🏷 ${escapeHtml(c)}</span>`).join('');
                if(item.cast && item.cast.length) modalCast.innerHTML = `<i class="fas fa-users"></i> ${escapeHtml(item.cast.join(', '))}`; else modalCast.innerHTML = '';
                modal.classList.add('open'); document.body.style.overflow = 'hidden';
            }
            function closeModal() { modal.classList.remove('open'); modalVideo.pause(); modalVideo.src = ''; document.body.style.overflow = ''; }
            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
            // Swipe down to close
            let touchStart = 0;
            modal.addEventListener('touchstart', e=>{ if(e.target===modal) touchStart = e.touches[0].clientY; });
            modal.addEventListener('touchmove', e=>{ if(e.target===modal && touchStart && e.touches[0].clientY - touchStart > 70) { closeModal(); touchStart=0; } });

            // ========== INICIALIZAÇÃO ==========
            function initApp() {
                if(!window.FILMES_JSON || !Array.isArray(window.FILMES_JSON)) { moviesContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro no catálogo</p></div>'; return; }
                renderSkeletons();
                setTimeout(()=>{ filmes = processData(window.FILMES_JSON); buildCategories(); refreshView(); }, 150);
            }
            if(checkSession()) { loginScreen.style.display = 'none'; app.classList.remove('hidden'); initApp(); }
            else { loginScreen.style.display = 'flex'; app.classList.add('hidden'); }
        })();
    </script>
</body>
</html>
