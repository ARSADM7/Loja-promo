<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PWA Task Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%233b82f6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='280' fill='white' font-weight='bold'%3E✓%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="container">
    <h1>📋 Minhas Tarefas</h1>
    <div class="add-task">
      <input type="text" id="taskInput" placeholder="Nova tarefa...">
      <button id="addTaskBtn">+ Adicionar</button>
    </div>
    <ul id="taskList"></ul>
    <p class="offline-status">✅ Você está online</p>
  </div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.log('Erro:', err));
      });
    }
  </script>
</body>
</html>
