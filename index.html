
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Player TS</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>
body { background: black; text-align: center; }
video { width: 90%; max-width: 800px; margin-top: 20px; }
</style>
</head>

<body>

<h2 style="color:white;">Player MPEG-TS</h2>

<video id="video" controls autoplay></video>

<script>
const video = document.getElementById('video');

if (mpegts.getFeatureList().mseLivePlayback) {

    const player = mpegts.createPlayer({
        type: 'mpegts',
        isLive: true, // MUITO IMPORTANTE
        url: 'https://dns.p2.wtf/rogerio55x/24992611250/100'
    });

    player.attachMediaElement(video);
    player.load();
    player.play();

} else {
    alert("Seu navegador não suporta MPEG-TS");
}
</script>

</body>
</html>
